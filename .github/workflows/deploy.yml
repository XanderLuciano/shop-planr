name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint
        continue-on-error: true
      
      - name: Type check
        run: npm run typecheck
        continue-on-error: true
      
      - name: Run tests
        run: npm run test
      
      - name: Build
        run: npm run build
      
      - name: Deploy to server
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634 # v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          fingerprint: ${{ secrets.SERVER_SSH_FINGERPRINT }}
          source: ".output/,Dockerfile,docker-compose.yml,server/repositories/sqlite/migrations/"
          target: "/opt/shop-planr/"
          strip_components: 0
          overwrite: true
      
      - name: Rebuild and restart container
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          fingerprint: ${{ secrets.SERVER_SSH_FINGERPRINT }}
          command_timeout: 10m
          script: |
            cd /opt/shop-planr
            docker build -t shop-planr:latest .
            docker compose down || true
            docker compose up -d
            docker image prune -f
            
            # Health check - wait for container to be healthy
            echo "Waiting for container to start..."
            sleep 5
            if curl -sf http://localhost:3005 > /dev/null; then
              echo "✅ Health check passed"
            else
              echo "❌ Health check failed"
              docker logs shop-planr --tail 50
              exit 1
            fi
