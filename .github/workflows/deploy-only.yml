name: Deploy Only (Manual)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Smoke test built output
        run: |
          node .output/server/index.mjs &
          SERVER_PID=$!
          sleep 5
          echo "Checking frontend..."
          curl -sf http://localhost:3000 > /dev/null
          echo "✅ Frontend OK"
          echo "Checking API..."
          curl -sf http://localhost:3000/api/jobs > /dev/null
          echo "✅ API OK"
          kill $SERVER_PID

      - name: Clean previous deploy artifacts
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            rm -rf /opt/shop-planr/.output

      - name: Deploy to server
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634 # v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: ".output/,Dockerfile,docker-compose.yml,server/repositories/sqlite/migrations/"
          target: "/opt/shop-planr/"
          strip_components: 0
          overwrite: true

      - name: Rebuild and restart container
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            cd /opt/shop-planr
            docker build -t shop-planr:latest .
            docker compose down || true
            docker compose up -d
            docker image prune -f

            # Health check - frontend + API
            echo "Waiting for container to start..."
            sleep 5
            FAILED=0
            if curl -sf http://localhost:3005 > /dev/null; then
              echo "✅ Frontend health check passed"
            else
              echo "❌ Frontend health check failed"
              FAILED=1
            fi
            if curl -sf http://localhost:3005/api/jobs > /dev/null; then
              echo "✅ API health check passed"
            else
              echo "❌ API health check failed"
              FAILED=1
            fi
            if [ $FAILED -ne 0 ]; then
              docker logs shop-planr --tail 50
              exit 1
            fi
